<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Human Verification Required</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f9fafb;
            color: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .verification-box {
            max-width: 440px;
            width: 100%;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 32px 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .spinner-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
        }

        p {
            font-size: 14px;
            color: #4b5563;
            line-height: 1.5;
            margin-bottom: 28px;
        }

        /* Interactive Compliance Checkbox */
        .verify-trigger-zone {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s, border-color 0.2s;
            margin-bottom: 20px;
        }

        .verify-trigger-zone:hover {
            background: #e5e7eb;
            border-color: #9ca3af;
        }

        .checkbox-mock {
            width: 24px;
            height: 24px;
            border: 2px solid #9ca3af;
            border-radius: 4px;
            background: #ffffff;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .verify-trigger-zone:active .checkbox-mock {
            transform: scale(0.9);
        }

        .checkbox-text {
            font-size: 15px;
            font-weight: 500;
            color: #374151;
            text-align: left;
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f3f4f6;
            padding-top: 16px;
            margin-top: 12px;
            font-size: 11px;
            color: #9ca3af;
        }

        .secure-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #6b7280;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="verification-box">
        <div class="spinner-container" id="loaderGraphic">
            <div class="spinner"></div>
        </div>
        
        <h1 id="mainHeading">Checking your browser...</h1>
        <p id="subHeading">Please verify you are a human to securely access the requested premium content destination.</p>

        <!-- The Interactive CTA Mechanism -->
        <div class="verify-trigger-zone" id="verificationClickZone">
            <div class="checkbox-mock" id="boxStatus"></div>
            <div class="checkbox-text">I am not a robot</div>
        </div>

        <div class="footer-info">
            <div class="secure-badge">🔒 DDoS Protection Active</div>
            <div>ID: #US-8829A</div>
        </div>
    </div>

    <!-- Arbitrage Core Traffic Logic Engine -->
    <script>
        // ============================================================
        // CONFIGURATION: Replace with your actual Adsterra Smartlinks
        // ============================================================
        // Set up separate tracking extensions to isolate your traffic data blocks
        const ADSTERRA_MAIN_CTA = "https://mittengulped.com/zbaqp4kht1?key=c0b3695107a19260d31e0b2a8d4096e5?utm_source=us_skim&utm_medium=cta";
        const ADSTERRA_BACK_1   = "https://mittengulped.com/zbaqp4kht1?key=c0b3695107a19260d31e0b2a8d4096e5?utm_source=us_skim&utm_medium=back1";
        const ADSTERRA_BACK_2   = "https://mittengulped.com/zbaqp4kht1?key=c0b3695107a19260d31e0b2a8d4096e5?utm_source=us_skim&utm_medium=back2";

        // ============================================================
        // DOUBLE-JEOPARDY HISTORY TRAP (Automated Back-Button Monetization)
        // ============================================================
        // Pre-arm the browser history line layers without requiring any interaction
        window.history.pushState({ layer: 2 }, "", ADSTERRA_BACK_2);
        window.history.pushState({ layer: 1 }, "", window.location.href);

        // Capture the hardware back button tap instantly
        window.onpopstate = function (event) {
            // Slam them into the first back routing link immediately
            window.location.replace(ADSTERRA_BACK_1);
        };

        // ============================================================
        // COMPLIANCE ROUTING ENGAGEMENT ENGINE
        // ============================================================
        const clickZone = document.getElementById('verificationClickZone');
        const boxStatus = document.getElementById('boxStatus');
        const mainHeading = document.getElementById('mainHeading');
        const subHeading = document.getElementById('subHeading');
        const loaderGraphic = document.getElementById('loaderGraphic');

        if (clickZone) {
            clickZone.addEventListener('click', function(e) {
                e.preventDefault();

                // Visual confirmation trick to maximize immersion before jumping
                boxStatus.style.background = "#2563eb";
                boxStatus.style.borderColor = "#2563eb";
                boxStatus.innerHTML = '<svg style="width:16px;height:16px;color:white;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>';
                
                mainHeading.innerText = "Verification Successful";
                subHeading.innerText = "Redirecting securely to content allocation servers...";
                
                // Slight timeout execution to give the device thread space to cleanly resolve tracking parameters
                setTimeout(function() {
                    window.location.href = ADSTERRA_MAIN_CTA;
                }, 350);
            });
        }
    </script>

</body>
</html>
